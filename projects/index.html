<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects — Wilbert Verayin</title>
  <meta property="og:title" content="Projects — Wilbert Verayin">
  <meta property="og:description" content="13 years shipping scalable systems for fintech, SaaS, and AI products.">
  <meta property="og:image" content="https://wilbertverayin.com/assets/screenshots/wilbertverayin.png">
  <meta property="og:url" content="https://wilbertverayin.com/projects">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://wilbertverayin.com/assets/screenshots/wilbertverayin.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --color-bg:         oklch(12% 0.018 250);
      --color-surface:    oklch(16% 0.018 250);
      --color-surface-2:  oklch(20% 0.018 250);
      --color-border:     oklch(28% 0.018 250);
      --color-accent:     oklch(82% 0.15 172);
      --color-accent-dim: oklch(65% 0.10 172);
      --color-text:       oklch(88% 0.015 250);
      --color-muted:      oklch(55% 0.015 250);
      --color-white:      oklch(96% 0.005 250);

      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;

      --text-xs:   0.725rem;
      --text-sm:   0.8125rem;
      --text-base: 0.875rem;
      --text-md:   1rem;

      --space-1:  0.25rem;
      --space-2:  0.5rem;
      --space-3:  0.75rem;
      --space-4:  1rem;
      --space-5:  1.25rem;
      --space-6:  1.5rem;
      --space-8:  2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;

      --ease-out:    cubic-bezier(0.0, 0.0, 0.2, 1);
      --ease-in-out: cubic-bezier(0.4, 0.0, 0.2, 1);
      --dur-fast: 150ms;
      --dur-base: 250ms;
      --dur-slow: 400ms;

      --radius-sm: 4px;
      --radius-md: 8px;
      --max-width: 1120px;
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: clip; scroll-behavior: smooth; }
    body {
      overflow-x: clip;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    /* ── LAYOUT ──────────────────────────────────────────── */
    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--space-8);
    }

    /* ── NAV ─────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: oklch(12% 0.018 250 / 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .nav-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--space-8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
    }

    .nav-logo img {
      height: 28px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: var(--space-8);
      align-items: center;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color var(--dur-fast) var(--ease-out);
    }

    .nav-links a:hover { color: var(--color-accent); }

    .nav-links a.nav-resume {
      color: var(--color-accent);
      border: 1px solid var(--color-accent-dim);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      transition: background var(--dur-fast) var(--ease-out);
    }

    .nav-links a.nav-resume:hover {
      background: oklch(82% 0.15 172 / 0.12);
    }

    /* ── PAGE HEADER ─────────────────────────────────────── */
    .page-header {
      padding: calc(52px + var(--space-16)) 0 var(--space-12);
      border-bottom: 1px solid var(--color-border);
    }

    .page-eyebrow {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-accent);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
    }

    .page-title {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--color-white);
      letter-spacing: -0.025em;
      line-height: 1;
      margin-bottom: var(--space-4);
    }

    .page-desc {
      font-size: var(--text-md);
      font-weight: 300;
      color: var(--color-muted);
      max-width: 56ch;
      line-height: 1.7;
    }

    /* ── SECTION LABEL ───────────────────────────────────── */
    .section {
      padding: var(--space-16) 0;
    }

    .s-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-10);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .s-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ── PROJECTS GRID ───────────────────────────────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-6);
    }

    /* ── PROJECT CARD ────────────────────────────────────── */
    .project-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color var(--dur-base) var(--ease-out);
    }

    .project-card:hover { border-color: var(--color-accent-dim); }

    /* visual area — screenshot, video, or fallback gradient */
    .project-visual {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      object-fit: cover;
      background: var(--color-surface-2);
      flex-shrink: 0;
    }

    .project-visual-fallback {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-muted);
    }

    .project-body {
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .project-hd {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-2);
    }

    .project-name {
      font-family: var(--font-mono);
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--color-white);
    }

    .project-date {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .project-product {
      font-size: var(--text-sm);
      color: var(--color-text);
      margin-bottom: var(--space-4);
      line-height: 1.6;
    }

    /* ownership + metric row */
    .project-signals {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .signal {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      display: flex;
      align-items: baseline;
      gap: var(--space-2);
    }

    .signal-label {
      color: var(--color-muted);
      flex-shrink: 0;
    }

    .signal-value {
      color: var(--color-text);
    }

    .signal-value.metric {
      color: var(--color-accent);
      font-weight: 600;
    }

    /* tech chips */
    .tech-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .t-chip {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
    }

    /* links */
    .project-links {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .project-link {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-accent);
      letter-spacing: 0.06em;
      transition: opacity var(--dur-fast) var(--ease-out);
    }

    .project-link:hover { opacity: 0.7; }

    .project-link.muted {
      color: var(--color-muted);
    }

    /* project sub-links (Visible Clinic sub-products) */
    .project-subs {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .project-sub {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
      display: flex;
      gap: var(--space-3);
      align-items: baseline;
    }

    .project-sub-name {
      color: var(--color-text);
      font-weight: 600;
      flex-shrink: 0;
    }

    .project-sub a {
      color: var(--color-accent-dim);
      transition: color var(--dur-fast) var(--ease-out);
    }

    .project-sub a:hover { color: var(--color-accent); }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--color-border);
      padding: var(--space-6) 0;
    }

    .ft-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
    }

    .ft-copy {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
    }

    .ft-links {
      display: flex;
      gap: var(--space-6);
    }

    .ft-links a {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
      transition: color var(--dur-fast) var(--ease-out);
    }

    .ft-links a:hover { color: var(--color-accent); }

    /* ── REVEAL ──────────────────────────────────────────── */
    .rv {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity var(--dur-slow) var(--ease-out),
                  transform var(--dur-slow) var(--ease-out);
    }

    .rv.in { opacity: 1; transform: translateY(0); }

    .rv:nth-child(2) { transition-delay: 60ms; }
    .rv:nth-child(3) { transition-delay: 120ms; }
    .rv:nth-child(4) { transition-delay: 180ms; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 768px) {
      .wrap { padding: 0 var(--space-5); }
      .nav-links { display: none; }
      .projects-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 414px) {
      .wrap { padding: 0 var(--space-4); }
    }

    /* ── REDUCED MOTION ──────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .rv { opacity: 1; transform: none; transition: none; }
      * { transition-duration: 1ms !important; }
    }
  </style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav class="nav" aria-label="Site navigation">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><img src="/assets/images/logo.svg" alt="Wilbert Verayin"></a>
    <div class="nav-links">
      <a href="/">← Home</a>
      <a href="/resume" class="nav-resume">Resume ↗</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <!-- ── PAGE HEADER ───────────────────────────────────── -->
  <header class="page-header">
    <p class="page-eyebrow rv">Selected Work</p>
    <h1 class="page-title rv">Projects</h1>
    <p class="page-desc rv">Professional engagements and personal builds — what I shipped, my role, and the impact.</p>
  </header>

  <!-- ── PROFESSIONAL WORK ──────────────────────────────── -->
  <section class="section" aria-label="Professional work">
    <h2 class="s-label">Professional</h2>
    <div id="prof-grid" class="projects-grid">
    </div>
  </section>

  <!-- ── PERSONAL PROJECTS ───────────────────────────────── -->
  <section class="section" aria-label="Personal projects">
    <h2 class="s-label">Personal</h2>
    <div id="personal-grid" class="projects-grid"></div>
  </section>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer>
    <div class="ft-inner">
      <span class="ft-copy">Wilbert Verayin &middot; 2026</span>
      <nav class="ft-links" aria-label="Footer links">
        <a href="https://github.com/wilbertverayin" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/wilbertverayin" target="_blank" rel="noopener">LinkedIn</a>
        <a href="/resume">Resume</a>
      </nav>
    </div>
  </footer>

</div>

<script>
  function stripProto(url) {
    return url.replace(/^https?:\/\//, '');
  }

  function visual(p) {
    if (p.video) return `<video class="project-visual" src="${p.video}" autoplay muted loop playsinline aria-label="${p.name} demo"></video>`;
    if (p.screenshot) return `<img src="${p.screenshot}" alt="${p.name} screenshot" class="project-visual">`;
    return '';
  }

  function chips(tech) {
    return tech.map(t => `<span class="t-chip">${t}</span>`).join('');
  }

  function link(url) {
    if (!url) return `<span class="project-link muted">Coming soon</span>`;
    return `<a href="${url}" class="project-link" target="_blank" rel="noopener">${stripProto(url)} ↗</a>`;
  }

  function renderProfCard(p) {
    const date = p.date ? `<span class="project-date">${p.date}</span>` : '';
    const signals = [
      p.role   ? `<div class="signal"><span class="signal-label">Role</span><span class="signal-value">${p.role}</span></div>` : '',
      p.impact ? `<div class="signal"><span class="signal-label">Impact</span><span class="signal-value metric">${p.impact}</span></div>` : '',
    ].join('');
    return `
      <div class="project-card rv">
        ${visual(p)}
        <div class="project-body">
          <div class="project-hd">
            <span class="project-name">${p.name}</span>
            ${date}
          </div>
          <p class="project-product">${p.product}</p>
          ${signals ? `<div class="project-signals">${signals}</div>` : ''}
          <div class="project-links">${link(p.url)}</div>
        </div>
      </div>`;
  }

  function renderPersonalCard(p) {
    const partOf = p.partOf ? `<div class="project-signals"><div class="signal"><span class="signal-label">Part of</span><span class="signal-value">${p.partOf}</span></div></div>` : '';
    const role = p.role && !p.partOf ? `<div class="project-signals"><div class="signal"><span class="signal-label">Role</span><span class="signal-value">${p.role}</span></div></div>` : '';
    return `
      <div class="project-card rv">
        ${visual(p)}
        <div class="project-body">
          <div class="project-hd">
            <span class="project-name">${p.name}</span>
          </div>
          <p class="project-product">${p.product}</p>
          ${partOf}${role}
          <div class="project-links">${link(p.url)}</div>
        </div>
      </div>`;
  }

  function observe() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.06, rootMargin: '0px 0px -32px 0px' });
    document.querySelectorAll('.rv').forEach(el => io.observe(el));
  }

  fetch('/data/projects.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('prof-grid').innerHTML = data.professional.filter(p => !p.hidden).map(renderProfCard).join('');
      document.getElementById('personal-grid').innerHTML = data.personal.map(renderPersonalCard).join('');
      observe();
    });
</script>

</body>
</html>
